<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💜 Surprise</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      touch-action: manipulation;
      font-family: system-ui, sans-serif;
    }

    canvas {
      display: block;
    }

    /* ===== COVER ===== */
    #cover {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #2a145a, #000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #e0d9ff;
      z-index: 10;
      text-align: center;
    }

    #cover h1 {
      font-size: 28px;
      margin: 10px 0;
    }

    #cover .btn {
      margin-top: 30px;
      padding: 16px 36px;
      border-radius: 40px;
      background: linear-gradient(135deg, #6b4bff, #9f7bff);
      color: white;
      font-size: 18px;
      box-shadow: 0 0 30px #6b4bff;
    }
  </style>
</head>

<body>

  <div id="cover">
    <h1>💜</h1>
    <h1>กดสิ่</h1>
    <div class="btn">✨</div>
  </div>

  <canvas id="c"></canvas>

  <!-- 🎵 MUSIC -->
  <audio id="bgm" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const audio = document.getElementById("bgm");
    const cover = document.getElementById("cover");

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    resize();
    addEventListener("resize", resize);

    /* ===== AUDIO (iOS SAFE) ===== */
    let audioCtx, analyser, dataArray, started = false;

    function start() {
      if (started) return;
      started = true;

      audio.muted = true;
      audio.play();

      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();

      const src = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);

      src.connect(analyser);
      analyser.connect(audioCtx.destination);

      audioCtx.resume().then(() => {
        audio.muted = false;
        audio.play();
      });

      cover.style.display = "none";
      burst(canvas.width / 2, canvas.height / 2);
    }

    cover.addEventListener("click", start, { once: true });
    cover.addEventListener("touchstart", start, { once: true });

    /* ===== SPACE BACKGROUND ===== */
    function drawSpace() {
      const g = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, canvas.width
      );
      g.addColorStop(0, "#2a145a");
      g.addColorStop(0.5, "#0a0025");
      g.addColorStop(1, "#000");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    /* ===== STARS ===== */
    const stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      t: Math.random() * Math.PI * 2
    }));

    function drawStars() {
      stars.forEach(s => {
        s.t += 0.02;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r + Math.sin(s.t) * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fill();
      });
    }

    /* ===== METEORS ===== */
    let meteors = [];
    setInterval(() => {
      meteors.push({
        x: Math.random() * canvas.width,
        y: -50,
        vx: Math.random() * 6 + 8,
        vy: Math.random() * 6 + 10,
        life: 70
      });
    }, 3000);

    function drawMeteors() {
      meteors.forEach(m => {
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx * 5, m.y - m.vy * 5);
        ctx.strokeStyle = "rgba(200,200,255,0.8)";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#bbaaff";
        ctx.stroke();

        m.x += m.vx;
        m.y += m.vy;
        m.life--;
      });
      meteors = meteors.filter(m => m.life > 0);
    }

    /* ===== HEART SHAPE ===== */
    function heart(t) {
      return {
        x: 16 * Math.sin(t) ** 3,
        y:
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
      };
    }

    class FloatingHeart {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 200;
        this.s = Math.random() * 0.22 + 0.18;
        this.v = Math.random() * 0.4 + 0.2;
        this.a = Math.random() * Math.PI * 2;
      }
      update(b) {
        this.y -= this.v + b * 2;
        this.a += 0.02;
        this.x += Math.sin(this.a) * 0.4;
        if (this.y < -80) this.reset();
      }
      draw(b) {
        ctx.beginPath();
        for (let t = 0; t <= Math.PI * 2; t += 0.12) {
          const p = heart(t);
          const x = this.x + p.x * this.s * (1 + b * 0.3);
          const y = this.y - p.y * this.s * (1 + b * 0.3);
          t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "rgba(160,130,255,0.9)";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#5b3bff";
        ctx.stroke();
      }
    }

    const hearts = Array.from({ length: 14 }, () => new FloatingHeart());

    /* ===== CLICK PARTICLES ===== */
    let particles = [];

    function burst(x, y) {
      for (let i = 0; i < 30; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 60
        });
      }
    }

    canvas.addEventListener("click", e => burst(e.clientX, e.clientY));
    canvas.addEventListener("touchstart", e => {
      const t = e.touches[0];
      burst(t.clientX, t.clientY);
    });

    function drawParticles() {
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(180,150,255,0.9)";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#7a5cff";
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
      });
      particles = particles.filter(p => p.life > 0);
    }

    /* ===== MAIN LOOP ===== */
    function loop() {
      drawSpace();
      drawStars();
      drawMeteors();

      let beat = 0;
      if (analyser) {
        analyser.getByteFrequencyData(dataArray);
        beat =
          dataArray.reduce((a, b) => a + b, 0) /
          dataArray.length /
          255;
      }

      hearts.forEach(h => {
        h.update(beat);
        h.draw(beat);
      });

      drawParticles();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>

</html>
